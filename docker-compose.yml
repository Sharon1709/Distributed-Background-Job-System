
services:
  postgres:
    image: postgres:16
    container_name: jobsystem-postgres
    environment:
      POSTGRES_USER: jobuser
      POSTGRES_PASSWORD: jobpassword
      POSTGRES_DB: jobsdb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: jobsystem-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: "${RABBITMQ_DEFAULT_USER:-guest}"
      RABBITMQ_DEFAULT_PASS: "${RABBITMQ_DEFAULT_PASS:-guest}"
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  api:
    build:
      context: .
      dockerfile: src/JobSystem.API/Dockerfile
    container_name: jobsystem-api
    depends_on:
      - postgres
      - rabbitmq
    env_file:
      - .env
    ports:
      - "5000:8080"

  worker:
    build:
      context: .
      dockerfile: src/JobSystem.Worker/Dockerfile
    container_name: jobsystem-worker
    depends_on:
      - postgres
      - rabbitmq
    restart: always
    env_file:
      - .env

volumes:
  postgres-data: