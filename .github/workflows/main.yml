name: Build & Test

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: 8.0.x

    - name: Restore
      run: dotnet restore MiniHangfire.sln

    - name: Build
      run: dotnet build MiniHangfire.sln --no-restore --configuration Release

    - name: Test
      run: dotnet test MiniHangfire.sln --no-build --configuration Release
